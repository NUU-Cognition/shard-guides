shard-spec: "0.1.0"
version: "0.2.0"
name: Guides
shorthand: gide
description: Create and manage how-to guides — single-page or multi-page instructional documents
dependencies:
  - source: NUU-Cognition/shard-flint
types:
  - name: Guide
    source: type-gide-guide.md

install:
  - source: (Dashboard) Guides.md
    dest: Mesh/(Dashboard) Guides.md
    once: true
folders:
  - Mesh/Types/Guides/
  - Mesh/Guides/
